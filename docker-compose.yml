services:
  mysql:
    image: mysql:8.0
    container_name: springboot_ms_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms
    ports:
      - "3307:3306"
    volumes:
      - ms_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ms_mysql_data:
