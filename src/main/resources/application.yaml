server:
  port: 8082
  servlet:
    context-path: /ms
springdoc:
  default-produces-media-type: application/json
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    doc-expansion: none
    disable-swagger-default-url: true
  show-actuator: false
